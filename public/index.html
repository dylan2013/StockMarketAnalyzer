<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股市損益分析</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f6f9;
      color: #1e2535;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a56db;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .upload-card {
      background: #ffffff;
      border: 1px solid #d1d9e6;
      border-radius: 12px;
      padding: 1.8rem 2rem;
      max-width: 640px;
      margin: 0 auto 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .field { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .file-drop {
      border: 2px dashed #c8d3e6;
      border-radius: 8px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #f8fafc;
      position: relative;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: #1a56db;
      background: #eef3fd;
    }
    .file-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-drop .hint {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .file-drop .filenames {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: #1a56db;
      word-break: break-all;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: #1a56db;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.4rem;
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    #error-msg {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin: 0 auto 1.5rem;
      max-width: 640px;
      display: none;
      font-size: 0.9rem;
    }

    #results { max-width: 900px; margin: 0 auto; display: none; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a56db;
      border-left: 4px solid #1a56db;
      padding-left: 0.8rem;
      margin: 2rem 0 1rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #d1d9e6;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .stat-card .value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1e2535;
    }
    .stat-card .value.pos { color: #16a34a; }
    .stat-card .value.neg { color: #dc2626; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    th {
      background: #f1f5f9;
      color: #64748b;
      text-align: right;
      padding: 0.65rem 0.9rem;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    th:first-child { text-align: left; }
    td {
      padding: 0.6rem 0.9rem;
      border-top: 1px solid #e8edf5;
      text-align: right;
      color: #475569;
    }
    td:first-child { text-align: left; color: #1e2535; }
    tr:hover td { background: #f8fafc; }
    .pos { color: #16a34a !important; }
    .neg { color: #dc2626 !important; }
  </style>
</head>
<body>

<h1>股市損益分析</h1>

<form id="upload-form">
  <div class="upload-card">
    <div class="field">
      <label>已實現損益 CSV</label>
      <div class="file-drop" id="csv-drop">
        <input type="file" name="csv" accept=".csv" id="csv-input" />
        <div class="hint">點擊或拖曳 .csv 檔案</div>
        <div class="filenames" id="csv-names"></div>
      </div>
    </div>
    <div class="field">
      <label>配息紀錄 MHT（可多選）</label>
      <div class="file-drop" id="mht-drop">
        <input type="file" name="mht" accept=".mht" multiple id="mht-input" />
        <div class="hint">點擊或拖曳 .mht 檔案（可多檔）</div>
        <div class="filenames" id="mht-names"></div>
      </div>
    </div>
    <button type="submit" id="submit-btn">開始分析</button>
  </div>
</form>

<div id="error-msg"></div>
<div id="results"></div>

<script>
  // ── 拖曳 & 選擇檔案顯示 ────────────────────────────────────
  function setupDrop(dropEl, inputEl, nameEl) {
    inputEl.addEventListener('change', () => showNames(inputEl.files, nameEl));
    dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('drag-over'); });
    dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
    dropEl.addEventListener('drop', e => {
      e.preventDefault();
      dropEl.classList.remove('drag-over');
      const dt = e.dataTransfer;
      if (dt.files.length) {
        const list = new DataTransfer();
        for (const f of dt.files) list.items.add(f);
        inputEl.files = list.files;
        showNames(inputEl.files, nameEl);
      }
    });
  }

  function showNames(files, nameEl) {
    nameEl.textContent = files.length
      ? Array.from(files).map(f => f.name).join('、')
      : '';
  }

  setupDrop(
    document.getElementById('csv-drop'),
    document.getElementById('csv-input'),
    document.getElementById('csv-names')
  );
  setupDrop(
    document.getElementById('mht-drop'),
    document.getElementById('mht-input'),
    document.getElementById('mht-names')
  );

  // ══════════════════════════════════════════════════════════
  // CSV 解析
  // ══════════════════════════════════════════════════════════
  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (c === ',' && !inQuote) {
        result.push(cur.trim());
        cur = '';
      } else {
        cur += c;
      }
    }
    result.push(cur.trim());
    return result;
  }

  function cleanNum(v) {
    if (!v) return 0;
    return parseFloat(v.replace(/,/g, '').replace(/%/g, '')) || 0;
  }

  function normaliseDate(v) {
    return v.replace(/\//g, '-');
  }

  function parseCSV(raw) {
    const text = raw.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim());

    if (lines.length < 2) throw new Error('CSV 內容不足，至少需要標題列 + 一筆資料');

    const headers = parseCSVLine(lines[0]);
    const findIdx = keyword => headers.findIndex(h => h.includes(keyword));

    const idx = {
      name:    findIdx('股票名稱'),
      date:    findIdx('日期'),
      pnl:     findIdx('損益'),
      buyAmt:  findIdx('買進價金'),
      sellAmt: findIdx('賣出價金'),
      fee:     findIdx('手續費'),
      tax:     findIdx('交易稅'),
    };

    if (idx.name === -1) throw new Error(
      `找不到「股票名稱」欄位。\n偵測到的標題：${headers.join(' | ')}\n請確認這是券商匯出的已實現損益 CSV 檔案。`
    );

    const rows = [];
    for (const line of lines.slice(1)) {
      const cols = parseCSVLine(line);
      const name = cols[idx.name] ?? '';
      if (!name) continue;
      rows.push({
        name,
        date:       normaliseDate(cols[idx.date] ?? ''),
        pnl:        cleanNum(cols[idx.pnl]),
        buyAmount:  cleanNum(cols[idx.buyAmt]),
        sellAmount: cleanNum(cols[idx.sellAmt]),
        fee:        cleanNum(cols[idx.fee]),
        tax:        cleanNum(cols[idx.tax]),
      });
    }

    if (rows.length === 0) throw new Error('CSV 沒有有效的資料列，請確認檔案內容。');

    let totalPnl = 0, totalBuy = 0, totalSell = 0, totalFee = 0, totalTax = 0;
    const stockMap = new Map();
    const yearMap  = new Map();

    for (const row of rows) {
      totalPnl  += row.pnl;
      totalBuy  += row.buyAmount;
      totalSell += row.sellAmount;
      totalFee  += row.fee;
      totalTax  += row.tax;

      const s = stockMap.get(row.name) ?? { pnl: 0, buyAmount: 0, count: 0 };
      s.pnl += row.pnl; s.buyAmount += row.buyAmount; s.count++;
      stockMap.set(row.name, s);

      const year = row.date.slice(0, 4);
      if (/^\d{4}$/.test(year)) {
        const y = yearMap.get(year) ?? { pnl: 0, buyAmount: 0, count: 0 };
        y.pnl += row.pnl; y.buyAmount += row.buyAmount; y.count++;
        yearMap.set(year, y);
      }
    }

    const byStock = [...stockMap.entries()]
      .map(([name, v]) => ({
        name, count: v.count,
        pnl:        Math.round(v.pnl),
        buyAmount:  Math.round(v.buyAmount),
        returnRate: v.buyAmount ? parseFloat((v.pnl / v.buyAmount * 100).toFixed(2)) : 0,
      }))
      .sort((a, b) => b.pnl - a.pnl);

    const byYear = [...yearMap.entries()]
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([year, v]) => ({
        year, count: v.count,
        pnl:        Math.round(v.pnl),
        buyAmount:  Math.round(v.buyAmount),
        returnRate: v.buyAmount ? parseFloat((v.pnl / v.buyAmount * 100).toFixed(2)) : 0,
      }));

    return {
      totalPnl:   Math.round(totalPnl),
      totalBuy:   Math.round(totalBuy),
      totalSell:  Math.round(totalSell),
      totalFee:   Math.round(totalFee),
      totalTax:   Math.round(totalTax),
      totalCount: rows.length,
      returnRate: totalBuy ? parseFloat((totalPnl / totalBuy * 100).toFixed(2)) : 0,
      byStock,
      byYear,
    };
  }

  // ══════════════════════════════════════════════════════════
  // MHT 解析（用瀏覽器 DOMParser 取代 node-html-parser）
  // ══════════════════════════════════════════════════════════
  const CODE_RE = /^[0-9]{4}[0-9A-Z]{0,2}$/;
  const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

  function cleanNumMHT(v) {
    return parseFloat(v.replace(/,/g, '')) || 0;
  }

  function extractHTML(mht) {
    const start = mht.search(/<!DOCTYPE html>/i);
    if (start === -1) throw new Error('找不到 HTML 內容，請確認為 .mht 格式');
    let html = mht.slice(start);
    const boundaryMatch = mht.match(/boundary="([^"]+)"/i);
    if (boundaryMatch) {
      const boundary = '--' + boundaryMatch[1];
      const boundaryPos = html.indexOf(boundary);
      if (boundaryPos > 0) html = html.slice(0, boundaryPos);
    }
    return html;
  }

  function extractTextNodes(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script, style').forEach(n => n.remove());

    const texts = [];
    function walk(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const t = node.textContent.trim();
        if (t) texts.push(t);
      } else {
        for (const child of node.childNodes) walk(child);
      }
    }
    walk(doc.body);
    return texts;
  }

  function parseTextNodes(nodes) {
    const records = [];
    for (let i = 0; i < nodes.length; i++) {
      const token = nodes[i];
      if (!CODE_RE.test(token)) continue;

      const code = token;
      const name = nodes[i + 1] ?? '';
      if (!name || name.length < 2) continue;

      let date = '', cash = 0, stockDiv = 0;
      const limit = Math.min(i + 35, nodes.length);
      for (let j = i + 2; j < limit; j++) {
        const t = nodes[j];
        if (!date && DATE_RE.test(t)) { date = t; continue; }
        if (t === '股息約') { cash = cleanNumMHT(nodes[j + 1] ?? '0'); continue; }
        if (t === '元及股票股息約' || t === '股票股息約') {
          const sv = cleanNumMHT(nodes[j + 1] ?? '0');
          if (sv > 0) stockDiv = sv;
          continue;
        }
        if (j > i + 2 && CODE_RE.test(t)) break;
      }
      if (date) records.push({ code, name, date, cash, stockDiv });
    }
    return records;
  }

  function dedup(records) {
    const seen = new Set();
    return records.filter(r => {
      const key = `${r.code}|${r.date}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function summarise(records) {
    let totalCash = 0, totalStock = 0;
    const stockMap = new Map();
    const yearMap  = new Map();

    for (const r of records) {
      totalCash  += r.cash;
      totalStock += r.stockDiv;
      const s = stockMap.get(r.code) ?? { name: r.name, cash: 0, stock: 0 };
      s.cash += r.cash; s.stock += r.stockDiv;
      stockMap.set(r.code, s);
      const year = r.date.slice(0, 4);
      const y = yearMap.get(year) ?? { cash: 0 };
      y.cash += r.cash;
      yearMap.set(year, y);
    }

    const byStock = [...stockMap.entries()]
      .map(([code, v]) => ({
        code, name: v.name,
        totalCash:  Math.round(v.cash),
        totalStock: v.stock,
        shareRatio: totalCash > 0 ? parseFloat((v.cash / totalCash * 100).toFixed(1)) : 0,
      }))
      .sort((a, b) => b.totalCash - a.totalCash);

    const byYear = [...yearMap.entries()]
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([year, v]) => ({ year, totalCash: Math.round(v.cash) }));

    return { totalCash: Math.round(totalCash), totalStock, recordCount: records.length, byStock, byYear };
  }

  function parseMHT(raw) {
    const html  = extractHTML(raw);
    const nodes = extractTextNodes(html);
    return parseTextNodes(nodes);
  }

  function mergeMHTs(raws) {
    const all = [];
    for (const raw of raws) all.push(...parseMHT(raw));
    return summarise(dedup(all));
  }

  // ══════════════════════════════════════════════════════════
  // 表單送出
  // ══════════════════════════════════════════════════════════
  function readFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = () => reject(new Error(`讀取檔案失敗：${file.name}`));
      reader.readAsText(file, 'utf-8');
    });
  }

  document.getElementById('upload-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn       = document.getElementById('submit-btn');
    const errEl     = document.getElementById('error-msg');
    const resultsEl = document.getElementById('results');

    const csvFiles = document.getElementById('csv-input').files;
    const mhtFiles = document.getElementById('mht-input').files;

    if (!csvFiles.length && !mhtFiles.length) {
      showError('請至少上傳一個 CSV 或 MHT 檔案。');
      return;
    }

    btn.disabled = true;
    btn.textContent = '分析中…';
    errEl.style.display = 'none';
    resultsEl.style.display = 'none';

    try {
      const realised = csvFiles.length
        ? parseCSV(await readFile(csvFiles[0]))
        : null;

      const dividend = mhtFiles.length
        ? mergeMHTs(await Promise.all(Array.from(mhtFiles).map(readFile)))
        : null;

      const combinedReturn = (realised?.totalPnl ?? 0) + (dividend?.totalCash ?? 0);
      const dividendSharePct = combinedReturn > 0 && dividend
        ? parseFloat((dividend.totalCash / combinedReturn * 100).toFixed(1))
        : 0;

      renderResults({ realised, dividend, combinedReturn, dividendSharePct });
      resultsEl.style.display = 'block';
      resultsEl.scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
      showError(err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '開始分析';
    }
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '錯誤：' + msg;
    el.style.display = 'block';
  }

  // ══════════════════════════════════════════════════════════
  // 渲染結果
  // ══════════════════════════════════════════════════════════
  function fmt(n)      { return Math.round(n).toLocaleString('zh-TW'); }
  function fmtSign(n)  { return (n >= 0 ? '+' : '') + fmt(n); }
  function fmtRate(n)  { return (n >= 0 ? '+' : '') + n + '%'; }
  function signClass(n){ return n >= 0 ? 'pos' : 'neg'; }

  function statCard(label, value, cls = '') {
    return `<div class="stat-card">
      <div class="label">${label}</div>
      <div class="value ${cls}">${value}</div>
    </div>`;
  }

  function renderResults(d) {
    const el = document.getElementById('results');
    let html = '';

    if (d.realised) {
      const r = d.realised;
      html += `<div class="section-title">已實現損益</div>`;
      html += `<div class="summary-grid">
        ${statCard('總損益', fmtSign(r.totalPnl) + ' 元', signClass(r.totalPnl))}
        ${statCard('整體報酬率', fmtRate(r.returnRate), signClass(r.returnRate))}
        ${statCard('總買進', fmt(r.totalBuy) + ' 元')}
        ${statCard('總賣出', fmt(r.totalSell) + ' 元')}
        ${statCard('手續費', fmt(r.totalFee) + ' 元')}
        ${statCard('交易稅', fmt(r.totalTax) + ' 元')}
        ${statCard('交易筆數', r.totalCount + ' 筆')}
      </div>`;

      if (r.byYear.length) {
        html += `<div class="section-title" style="font-size:.9rem;margin-top:1.2rem;">年度損益</div>`;
        html += `<table><thead><tr>
          <th>年份</th><th>損益（元）</th><th>報酬率</th><th>筆數</th>
        </tr></thead><tbody>`;
        for (const y of r.byYear) {
          html += `<tr>
            <td>${y.year}</td>
            <td class="${signClass(y.pnl)}">${fmtSign(y.pnl)}</td>
            <td class="${signClass(y.returnRate)}">${fmtRate(y.returnRate)}</td>
            <td>${y.count}</td>
          </tr>`;
        }
        html += `</tbody></table>`;
      }

      if (r.byStock.length) {
        html += `<div class="section-title" style="font-size:.9rem;margin-top:1.2rem;">個股損益</div>`;
        html += `<table><thead><tr>
          <th>股票</th><th>損益（元）</th><th>報酬率</th><th>筆數</th>
        </tr></thead><tbody>`;
        for (const s of r.byStock) {
          html += `<tr>
            <td>${s.name}</td>
            <td class="${signClass(s.pnl)}">${fmtSign(s.pnl)}</td>
            <td class="${signClass(s.returnRate)}">${fmtRate(s.returnRate)}</td>
            <td>${s.count}</td>
          </tr>`;
        }
        html += `</tbody></table>`;
      }
    }

    if (d.dividend) {
      const div = d.dividend;
      html += `<div class="section-title">配股配息</div>`;
      html += `<div class="summary-grid">
        ${statCard('累積現金股息', '+' + fmt(div.totalCash) + ' 元', 'pos')}
        ${statCard('累積配股', div.totalStock + ' 股')}
        ${statCard('持股標的', div.byStock.length + ' 檔')}
        ${statCard('配息紀錄', div.recordCount + ' 筆')}
      </div>`;

      if (div.byYear.length) {
        html += `<div class="section-title" style="font-size:.9rem;margin-top:1.2rem;">年度股息</div>`;
        html += `<table><thead><tr><th>年份</th><th>現金股息（元）</th></tr></thead><tbody>`;
        for (const y of div.byYear) {
          html += `<tr><td>${y.year}</td><td class="pos">+${fmt(y.totalCash)}</td></tr>`;
        }
        html += `</tbody></table>`;
      }

      if (div.byStock.length) {
        html += `<div class="section-title" style="font-size:.9rem;margin-top:1.2rem;">個股配息</div>`;
        html += `<table><thead><tr>
          <th>股票</th><th>現金股息（元）</th><th>佔比</th><th>配股（股）</th>
        </tr></thead><tbody>`;
        for (const s of div.byStock) {
          html += `<tr>
            <td>${s.name}（${s.code}）</td>
            <td class="pos">+${fmt(s.totalCash)}</td>
            <td>${s.shareRatio}%</td>
            <td>${s.totalStock > 0 ? s.totalStock : '—'}</td>
          </tr>`;
        }
        html += `</tbody></table>`;
      }
    }

    if (d.realised || d.dividend) {
      html += `<div class="section-title">含息總報酬</div>`;
      html += `<div class="summary-grid">`;
      if (d.realised) html += statCard('已實現價差', fmtSign(d.realised.totalPnl) + ' 元', signClass(d.realised.totalPnl));
      if (d.dividend) html += statCard('現金股息', '+' + fmt(d.dividend.totalCash) + ' 元', 'pos');
      html += statCard('含息總報酬', fmtSign(d.combinedReturn) + ' 元', signClass(d.combinedReturn));
      if (d.realised && d.dividend) html += statCard('股息佔比', d.dividendSharePct + '%');
      html += `</div>`;
    }

    el.innerHTML = html;
  }
</script>
</body>
</html>
